<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Card & Chat STOMP Test</title>
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 16px; font-size: 13px; }
    h2 { color: #569cd6; margin-bottom: 12px; }
    h3 { color: #9cdcfe; margin-bottom: 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }

    .header { background: #252526; border: 1px solid #3c3c3c; border-radius: 6px; padding: 12px 16px; margin-bottom: 12px; }
    .header-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
    .header-row:last-child { margin-bottom: 0; }

    .main { display: grid; grid-template-columns: 240px 240px 1fr; gap: 10px; }
    .panel { background: #252526; border: 1px solid #3c3c3c; border-radius: 6px; padding: 12px; }

    .section { margin-bottom: 14px; }
    .section:last-child { margin-bottom: 0; }

    label { display: block; color: #808080; font-size: 11px; margin-bottom: 3px; }
    input[type=text], input[type=number] {
      background: #3c3c3c; color: #d4d4d4; border: 1px solid #6b6b6b;
      padding: 5px 8px; border-radius: 4px; width: 100%; margin-bottom: 5px; font-family: monospace; font-size: 12px;
    }
    input:focus { outline: none; border-color: #569cd6; }

    button {
      padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer;
      font-family: monospace; font-size: 12px; width: 100%; margin-bottom: 4px;
      background: #0e639c; color: white; transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #1177bb; }
    button:disabled { background: #3c3c3c; color: #6b6b6b; cursor: not-allowed; }
    button.danger { background: #6b2727; }
    button.danger:hover:not(:disabled) { background: #8b3333; }
    button.success { background: #1e5c2e; }
    button.success:hover:not(:disabled) { background: #256b37; }
    button.warning { background: #6b5a1e; }
    button.warning:hover:not(:disabled) { background: #7d6a24; }
    button.connect-btn { background: #1e5c2e; }
    button.connect-btn:hover:not(:disabled) { background: #256b37; }
    button.small { padding: 4px 8px; width: auto; margin-bottom: 0; }

    .status-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: #6b6b6b; margin-right: 6px; vertical-align: middle;
    }
    .status-dot.connected { background: #4ec9b0; }
    .status-label { font-size: 11px; color: #808080; }

    #log {
      background: #1e1e1e; border: 1px solid #3c3c3c; border-radius: 4px;
      padding: 10px; height: calc(100vh - 140px); overflow-y: auto; font-size: 11px; line-height: 1.6;
    }
    .log-entry { margin-bottom: 2px; border-bottom: 1px solid #2a2a2a; padding-bottom: 2px; }
    .log-time { color: #569cd6; }
    .log-role { font-weight: bold; margin: 0 4px; }
    .log-role.master { color: #f8c555; }
    .log-role.user { color: #9cdcfe; }
    .log-role.sys { color: #808080; }
    .log-msg { white-space: pre-wrap; word-break: break-all; }

    .ev-room    { color: #9cdcfe; }
    .ev-chat    { color: #4ec9b0; }
    .ev-read    { color: #6a9955; }
    .ev-typing  { color: #808080; }
    .ev-card-select { color: #c586c0; }
    .ev-card-spread { color: #c586c0; }
    .ev-card-pick   { color: #d7ba7d; }
    .ev-card-reveal { color: #f8c555; }
    .ev-reset   { color: #808080; }
    .ev-error   { color: #f44747; }
    .ev-sent    { color: #dcdcaa; }
    .ev-info    { color: #608b4e; }

    .divider { border: none; border-top: 1px solid #3c3c3c; margin: 8px 0; }
    .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  </style>
</head>
<body>
  <h2>Card &amp; Chat STOMP Test</h2>

  <div class="header">
    <div class="header-row">
      <div style="flex:1">
        <label>Master SID</label>
        <input type="text" id="masterSid" placeholder="마스터 계정 SID 쿠키 값" />
      </div>
      <div style="flex:1">
        <label>User SID</label>
        <input type="text" id="userSid" placeholder="일반 유저 계정 SID 쿠키 값" />
      </div>
      <div style="width:120px">
        <label>Room ID</label>
        <input type="number" id="roomId" placeholder="roomId" />
      </div>
      <div style="width:130px; padding-top:14px">
        <button class="connect-btn" onclick="connectBoth()">Connect Both</button>
      </div>
      <div style="width:110px; padding-top:14px">
        <button class="danger" onclick="disconnectBoth()">Disconnect</button>
      </div>
    </div>
    <div class="header-row">
      <span><span class="status-dot" id="masterDot"></span><span class="status-label">Master: <span id="masterStatus">disconnected</span></span></span>
      &nbsp;&nbsp;
      <span><span class="status-dot" id="userDot"></span><span class="status-label">User: <span id="userStatus">disconnected</span></span></span>
    </div>
  </div>

  <div class="main">

    <!-- MASTER PANEL -->
    <div class="panel">
      <h3>Master Panel</h3>

      <div class="section">
        <button onclick="masterEnter()">Enter Room</button>
        <button onclick="masterLeave()">Leave Room</button>
        <button class="success" onclick="startRoom()">Start Room (WAITING→ACTIVE)</button>
        <button class="danger" onclick="endRoom()">End Room (ACTIVE→CLOSED)</button>
      </div>

      <hr class="divider">

      <div class="section">
        <label>setId</label>
        <input type="number" id="setId" placeholder="카드 세트 ID" value="1" />
        <button class="warning" onclick="selectCardSet()">Select Card Set</button>
      </div>

      <div class="section">
        <label>cardIds (쉼표 구분)</label>
        <input type="text" id="cardIds" placeholder="1,2,3,4,5" />
        <button class="warning" onclick="spreadCards()">Spread Cards</button>
      </div>

      <div class="section">
        <label>Reveal position</label>
        <input type="number" id="revealPosition" placeholder="0" value="0" />
        <button class="warning" onclick="revealCard()">Reveal Card</button>
      </div>

      <div class="section">
        <button onclick="resetReading()">Reset Reading</button>
      </div>
    </div>

    <!-- USER PANEL -->
    <div class="panel">
      <h3>User Panel</h3>

      <div class="section">
        <button onclick="userEnter()">Enter Room</button>
        <button onclick="userLeave()">Leave Room</button>
      </div>

      <hr class="divider">

      <div class="section">
        <label>positions (쉼표 구분)</label>
        <input type="text" id="pickPositions" placeholder="0,2" />
        <button class="warning" onclick="pickCards()">Pick Cards</button>
      </div>

      <hr class="divider">

      <div class="section">
        <label>Message content</label>
        <input type="text" id="msgContent" placeholder="메시지 내용" value="안녕하세요" />
        <button onclick="sendMessage()">Send Message</button>
      </div>

      <div class="section">
        <label>lastReadMessageId</label>
        <input type="number" id="lastReadId" placeholder="messageId" />
        <button onclick="readMessages()">Read Messages</button>
      </div>

      <div class="section">
        <button onclick="sendTyping(true)">Typing ON</button>
        <button onclick="sendTyping(false)">Typing OFF</button>
      </div>
    </div>

    <!-- EVENT LOG -->
    <div class="panel">
      <div class="log-header">
        <h3 style="margin:0">Event Log</h3>
        <button class="small" onclick="clearLog()">Clear</button>
      </div>
      <div id="log"></div>
    </div>

  </div>

  <script>
    let masterClient = null;
    let userClient = null;
    let currentRoomId = null;

    // ── 로그 ──────────────────────────────────────────────
    function log(role, cssClass, label, data) {
      const el = document.getElementById('log');
      const time = new Date().toLocaleTimeString('ko-KR', { hour12: false });
      const roleHtml = `<span class="log-role ${role}">[${role.toUpperCase()}]</span>`;
      const body = data ? '\n' + (typeof data === 'string' ? data : JSON.stringify(data, null, 2)) : '';
      el.innerHTML += `<div class="log-entry"><span class="log-time">${time}</span>${roleHtml}<span class="log-msg ${cssClass}"> ${label}${body}</span></div>`;
      el.scrollTop = el.scrollHeight;
    }

    function clearLog() { document.getElementById('log').innerHTML = ''; }

    // ── 상태 표시 ──────────────────────────────────────────
    function setStatus(role, connected) {
      const dot = document.getElementById(role + 'Dot');
      const status = document.getElementById(role + 'Status');
      dot.className = 'status-dot' + (connected ? ' connected' : '');
      status.textContent = connected ? 'connected' : 'disconnected';
    }

    // ── 이벤트 타입 → CSS 클래스 ──────────────────────────
    function eventClass(type) {
      if (!type) return 'ev-info';
      if (type.startsWith('ROOM_'))    return 'ev-room';
      if (type === 'CHAT_MESSAGE')     return 'ev-chat';
      if (type === 'READ_UPDATED')     return 'ev-read';
      if (type === 'TYPING')           return 'ev-typing';
      if (type === 'CARD_SET_SELECTED') return 'ev-card-select';
      if (type === 'CARDS_SPREAD')     return 'ev-card-spread';
      if (type === 'CARD_PICKED')      return 'ev-card-pick';
      if (type === 'CARD_REVEALED')    return 'ev-card-reveal';
      if (type === 'READING_RESET')    return 'ev-reset';
      return 'ev-info';
    }

    // ── 공통 구독 핸들러 ──────────────────────────────────
    function onRoomEvent(frame, role) {
      try {
        const data = JSON.parse(frame.body);
        const type = data.eventType || '(no type)';
        log(role, eventClass(type), type, data);
      } catch {
        log(role, 'ev-info', frame.body);
      }
    }

    function onPersonalError(frame, role) {
      try {
        const data = JSON.parse(frame.body);
        log(role, 'ev-error', 'ERROR', data);
      } catch {
        log(role, 'ev-error', 'ERROR: ' + frame.body);
      }
    }

    // ── STOMP 클라이언트 생성 ──────────────────────────────
    function createClient(sid, role, roomId) {
      // SID 쿠키를 해당 도메인에 세팅 (같은 origin이므로 가능)
      document.cookie = `SID=${sid}; path=/`;

      const client = new StompJs.Client({
        webSocketFactory: () => new SockJS(window.location.origin + '/ws/chat'),
        reconnectDelay: 0,
        onConnect: () => {
          setStatus(role, true);
          log(role, 'ev-info', `Connected (SID: ${sid.substring(0, 8)}...)`);

          client.subscribe(`/topic/rooms/${roomId}`, (frame) => onRoomEvent(frame, role));
          client.subscribe(`/user/queue/errors`, (frame) => onPersonalError(frame, role));
          log(role, 'ev-info', `Subscribed /topic/rooms/${roomId} + /user/queue/errors`);
        },
        onDisconnect: () => {
          setStatus(role, false);
          log(role, 'ev-info', 'Disconnected');
        },
        onStompError: (frame) => {
          log(role, 'ev-error', 'STOMP ERROR: ' + frame.headers['message']);
        },
        onWebSocketError: (e) => {
          log(role, 'ev-error', 'WebSocket ERROR: ' + e);
        }
      });
      return client;
    }

    // ── 연결/해제 ──────────────────────────────────────────
    function connectBoth() {
      const masterSid = document.getElementById('masterSid').value.trim();
      const userSid   = document.getElementById('userSid').value.trim();
      const roomId    = document.getElementById('roomId').value.trim();

      if (!masterSid || !userSid || !roomId) {
        alert('Master SID, User SID, Room ID를 모두 입력하세요.');
        return;
      }

      currentRoomId = roomId;
      disconnectBoth();

      // Master 먼저 연결 후 쿠키 교체 → User 연결
      // 두 클라이언트는 연결 시점의 쿠키(SID)로 WebSocket 핸드셰이크
      masterClient = createClient(masterSid, 'master', roomId);
      masterClient.activate();

      // 100ms 뒤 user 연결 (SID 쿠키 교체 후)
      setTimeout(() => {
        userClient = createClient(userSid, 'user', roomId);
        userClient.activate();
        // 연결 후 master SID 복원 (이후 master 전송 시 사용)
        setTimeout(() => { document.cookie = `SID=${masterSid}; path=/`; }, 500);
      }, 100);
    }

    function disconnectBoth() {
      masterClient?.deactivate();
      userClient?.deactivate();
      masterClient = null;
      userClient = null;
      setStatus('master', false);
      setStatus('user', false);
    }

    // ── 전송 헬퍼 ──────────────────────────────────────────
    function masterSend(path, body) {
      if (!masterClient?.connected) { log('sys', 'ev-error', 'Master가 연결되지 않았습니다'); return; }
      const destination = `/app/rooms/${currentRoomId}/${path}`;
      const json = JSON.stringify(body);
      masterClient.publish({ destination, body: json });
      log('master', 'ev-sent', `→ ${destination}`, body);
    }

    function userSend(path, body) {
      if (!userClient?.connected) { log('sys', 'ev-error', 'User가 연결되지 않았습니다'); return; }
      const destination = `/app/rooms/${currentRoomId}/${path}`;
      const json = JSON.stringify(body);
      userClient.publish({ destination, body: json });
      log('user', 'ev-sent', `→ ${destination}`, body);
    }

    // ── Room 명령 ──────────────────────────────────────────
    function masterEnter()  { masterSend('enter', {}); }
    function masterLeave()  { masterSend('leave', {}); }
    function startRoom()    { masterSend('start', {}); }
    function endRoom()      { masterSend('end',   {}); }
    function userEnter()    { userSend('enter', {}); }
    function userLeave()    { userSend('leave', {}); }

    // ── 카드 명령 (마스터) ────────────────────────────────
    function selectCardSet() {
      const setId = parseInt(document.getElementById('setId').value);
      if (isNaN(setId)) { log('sys', 'ev-error', 'setId를 입력하세요'); return; }
      masterSend('cards/set', { setId });
    }

    function spreadCards() {
      const setId = parseInt(document.getElementById('setId').value);
      const raw   = document.getElementById('cardIds').value.trim();
      if (!raw) { log('sys', 'ev-error', 'cardIds를 입력하세요 (쉼표 구분)'); return; }
      const cardIds = raw.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
      masterSend('cards/spread', { setId, cardIds });
    }

    function revealCard() {
      const position = parseInt(document.getElementById('revealPosition').value);
      if (isNaN(position)) { log('sys', 'ev-error', 'position을 입력하세요'); return; }
      masterSend('cards/reveal', { position });
    }

    function resetReading() { masterSend('cards/reset', {}); }

    // ── 카드 명령 (사용자) ────────────────────────────────
    function pickCards() {
      const raw = document.getElementById('pickPositions').value.trim();
      if (!raw) { log('sys', 'ev-error', 'positions를 입력하세요 (쉼표 구분)'); return; }
      const positions = raw.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
      userSend('cards/pick', { positions });
    }

    // ── 채팅 명령 (사용자) ────────────────────────────────
    function sendMessage() {
      const content = document.getElementById('msgContent').value.trim();
      if (!content) { log('sys', 'ev-error', 'content를 입력하세요'); return; }
      userSend('messages', { content, messageType: 'TEXT' });
    }

    function readMessages() {
      const lastReadMessageId = parseInt(document.getElementById('lastReadId').value);
      if (isNaN(lastReadMessageId)) { log('sys', 'ev-error', 'lastReadMessageId를 입력하세요'); return; }
      userSend('read', { lastReadMessageId });
    }

    function sendTyping(isTyping) {
      userSend('typing', { typing: isTyping });
    }
  </script>
</body>
</html>
