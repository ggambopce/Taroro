<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>포인트 충전 테스트</title>
  <script src="https://js.tosspayments.com/v1/payment"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 40px 16px; }
    .card { background: #fff; border-radius: 12px; padding: 32px; width: 100%; max-width: 440px; box-shadow: 0 2px 16px rgba(0,0,0,.08); }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 24px; color: #1a1a1a; }
    label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
    input[type=number] { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; font-size: 15px; outline: none; transition: border .15s; }
    input[type=number]:focus { border-color: #4e6cff; }
    .btn { display: block; width: 100%; margin-top: 20px; padding: 13px; background: #4e6cff; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background .15s; }
    .btn:hover { background: #3a56e8; }
    .btn:disabled { background: #aaa; cursor: default; }
    .result { margin-top: 20px; padding: 14px; border-radius: 8px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
    .result.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .result.error   { background: #fdecea; color: #c62828; border: 1px solid #ef9a9a; }
    .result.info    { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }
    .divider { border: none; border-top: 1px solid #eee; margin: 24px 0; }
    .step { font-size: 12px; color: #999; margin-bottom: 16px; }
  </style>
</head>
<body>
<div class="card">
  <h1>포인트 충전 테스트</h1>

  <!-- 충전 폼 (파라미터가 없을 때 표시) -->
  <div id="chargeSection">
    <p class="step">1. 충전 금액 입력 → 2. Toss 결제 → 3. 자동 confirm</p>
    <label for="amount">충전 금액 (원)</label>
    <input type="number" id="amount" value="1000" min="100" step="100" />
    <button class="btn" id="chargeBtn" onclick="startCharge()">충전하기</button>
    <div id="chargeResult"></div>
  </div>

  <hr class="divider" />

  <!-- 결제 완료 후 confirm 섹션 -->
  <div id="confirmSection" style="display:none">
    <p class="step">Toss 결제 완료 — confirm 중...</p>
    <div id="confirmResult"></div>
  </div>
</div>

<script>
  const CLIENT_KEY = 'test_ck_DLJOpm5Qrl76NxjQ9RLNVPNdxbWn';
  const BASE_URL = window.location.origin;

  function showResult(containerId, type, text) {
    const el = document.getElementById(containerId);
    el.className = 'result ' + type;
    el.textContent = text;
  }

  // ── 결제 시작 ──────────────────────────────────────────────
  async function startCharge() {
    const amount = Number(document.getElementById('amount').value);
    if (!amount || amount < 100) {
      showResult('chargeResult', 'error', '100원 이상 입력하세요.');
      return;
    }

    document.getElementById('chargeBtn').disabled = true;
    showResult('chargeResult', 'info', 'ready API 호출 중...');

    try {
      const res = await fetch('/api/point/charge/toss/ready', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ pointAmount: amount }),
      });
      const json = await res.json();

      if (!json.success) {
        showResult('chargeResult', 'error', 'Ready 실패:\n' + JSON.stringify(json, null, 2));
        document.getElementById('chargeBtn').disabled = false;
        return;
      }

      const { orderId, amount: orderAmount } = json.data;
      showResult('chargeResult', 'info', `orderId: ${orderId}\nToss 결제창으로 이동 중...`);

      // Toss SDK로 결제 요청 — 완료 후 이 페이지로 리다이렉트
      const tossPayments = TossPayments(CLIENT_KEY);
      await tossPayments.requestPayment('카드', {
        amount: orderAmount,
        orderId,
        orderName: '포인트 충전',
        customerName: '테스터',
        successUrl: `${BASE_URL}/point-check.html`,
        failUrl:    `${BASE_URL}/point-check.html?fail=true`,
      });
    } catch (err) {
      showResult('chargeResult', 'error', '오류:\n' + err.message);
      document.getElementById('chargeBtn').disabled = false;
    }
  }

  // ── 결제 완료 후 자동 confirm ────────────────────────────────
  async function handleReturn() {
    const params = new URLSearchParams(window.location.search);
    const paymentKey = params.get('paymentKey');
    const orderId    = params.get('orderId');
    const fail       = params.get('fail');

    if (fail) {
      document.getElementById('chargeSection').style.display = 'none';
      document.getElementById('confirmSection').style.display = 'block';
      showResult('confirmResult', 'error', '결제가 취소되었습니다.');
      return;
    }

    if (!paymentKey || !orderId) return; // 파라미터 없으면 일반 진입

    // 파라미터 있으면 confirm 처리
    document.getElementById('chargeSection').style.display = 'none';
    document.getElementById('confirmSection').style.display = 'block';
    showResult('confirmResult', 'info', 'confirm API 호출 중...\npaymentKey: ' + paymentKey);

    try {
      const res = await fetch('/api/point/charge/toss/confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ paymentKey, orderId }),
      });
      const json = await res.json();

      if (json.success) {
        showResult('confirmResult', 'success',
          '포인트 충전 완료!\n\n' + JSON.stringify(json, null, 2));
      } else {
        showResult('confirmResult', 'error',
          'Confirm 실패:\n' + JSON.stringify(json, null, 2));
      }
    } catch (err) {
      showResult('confirmResult', 'error', '오류:\n' + err.message);
    }

    // URL 파라미터 정리 (뒤로가기 재호출 방지)
    window.history.replaceState({}, '', '/point-check.html');
  }

  handleReturn();
</script>
</body>
</html>
